<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#1D4ED8"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#F0F4FF;stop-opacity:0.95"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.15"/>
    </filter>
    <filter id="innershadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background rounded square (macOS style) -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>

  <!-- Subtle inner highlight -->
  <rect x="16" y="16" width="992" height="496" rx="208" fill="white" opacity="0.07"/>

  <!-- Source image card (left) -->
  <g filter="url(#shadow)">
    <rect x="120" y="220" width="320" height="260" rx="24" fill="url(#card)"/>
    <!-- Mountain landscape icon -->
    <circle cx="210" cy="310" r="32" fill="#FBBF24"/>
    <polygon points="160,440 240,340 300,390 370,300 400,440" fill="#34D399" opacity="0.7"/>
    <polygon points="150,440 220,360 300,440" fill="#10B981" opacity="0.85"/>
    <!-- Format label -->
    <rect x="300" y="232" width="100" height="36" rx="8" fill="#EF4444" opacity="0.9"/>
    <text x="350" y="257" font-family="SF Pro Display, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" font-size="22" fill="white" text-anchor="middle">PNG</text>
  </g>

  <!-- Arrow -->
  <g transform="translate(512, 350)">
    <rect x="-60" y="-16" width="70" height="32" rx="6" fill="url(#arrow)"/>
    <polygon points="15,-28 60,0 15,28" fill="url(#arrow)"/>
  </g>

  <!-- Result JPG card (right) -->
  <g filter="url(#shadow)">
    <rect x="584" y="220" width="320" height="260" rx="24" fill="url(#card)"/>
    <!-- Identical landscape (converted) -->
    <circle cx="674" cy="310" r="32" fill="#FBBF24"/>
    <polygon points="624,440 704,340 764,390 834,300 864,440" fill="#34D399" opacity="0.7"/>
    <polygon points="614,440 684,360 764,440" fill="#10B981" opacity="0.85"/>
    <!-- JPG label -->
    <rect x="764" y="232" width="100" height="36" rx="8" fill="#3B82F6" opacity="0.9"/>
    <text x="814" y="257" font-family="SF Pro Display, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" font-size="22" fill="white" text-anchor="middle">JPG</text>
  </g>

  <!-- App name -->
  <text x="512" y="600" font-family="SF Pro Display, -apple-system, Helvetica, Arial, sans-serif" font-weight="800" font-size="120" fill="white" text-anchor="middle" letter-spacing="-2">NemJPG</text>

  <!-- Tagline -->
  <text x="512" y="670" font-family="SF Pro Display, -apple-system, Helvetica, Arial, sans-serif" font-weight="500" font-size="38" fill="white" text-anchor="middle" opacity="0.8">Batch Image Converter</text>

  <!-- Supported format pills -->
  <g font-family="SF Pro Display, -apple-system, Helvetica, Arial, sans-serif" font-size="26" font-weight="600" text-anchor="middle">
    <rect x="130" y="720" width="90" height="40" rx="12" fill="white" opacity="0.15"/>
    <text x="175" y="747" fill="white" opacity="0.9">PNG</text>
    <rect x="240" y="720" width="90" height="40" rx="12" fill="white" opacity="0.15"/>
    <text x="285" y="747" fill="white" opacity="0.9">BMP</text>
    <rect x="350" y="720" width="90" height="40" rx="12" fill="white" opacity="0.15"/>
    <text x="395" y="747" fill="white" opacity="0.9">GIF</text>
    <rect x="460" y="720" width="90" height="40" rx="12" fill="white" opacity="0.15"/>
    <text x="505" y="747" fill="white" opacity="0.9">TIFF</text>
    <rect x="570" y="720" width="110" height="40" rx="12" fill="white" opacity="0.15"/>
    <text x="625" y="747" fill="white" opacity="0.9">WebP</text>
    <rect x="700" y="720" width="100" height="40" rx="12" fill="white" opacity="0.15"/>
    <text x="750" y="747" fill="white" opacity="0.9">HEIC</text>
    <rect x="820" y="720" width="90" height="40" rx="12" fill="white" opacity="0.15"/>
    <text x="865" y="747" fill="white" opacity="0.9">RAW</text>
  </g>

  <!-- Checkmark badge -->
  <circle cx="880" cy="180" r="50" fill="#10B981"/>
  <polyline points="855,180 873,198 905,162" fill="none" stroke="white" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
