<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2C5F9A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arrow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E7D32;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Rounded rectangle background -->
  <rect x="16" y="16" width="480" height="480" rx="64" ry="64" fill="url(#bg)" />
  <!-- Image icon (mountain/sun) -->
  <rect x="80" y="100" width="160" height="130" rx="12" ry="12" fill="white" opacity="0.9" />
  <circle cx="130" cy="140" r="18" fill="#FFD54F" />
  <polygon points="100,215 140,165 170,195 200,155 225,215" fill="#66BB6A" opacity="0.8" />
  <polygon points="90,215 130,175 170,215" fill="#43A047" opacity="0.9" />
  <!-- Arrow -->
  <g transform="translate(256, 165)">
    <polygon points="0,-25 50,0 0,25" fill="url(#arrow)" />
    <rect x="-40" y="-10" width="45" height="20" rx="4" fill="url(#arrow)" />
  </g>
  <!-- JPG badge -->
  <rect x="320" y="110" width="120" height="110" rx="16" ry="16" fill="white" opacity="0.95" />
  <text x="380" y="178" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="42" fill="#2C5F9A" text-anchor="middle">.JPG</text>
  <!-- NemJPG text -->
  <text x="256" y="330" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="80" fill="white" text-anchor="middle" letter-spacing="2">NemJPG</text>
  <!-- Tagline -->
  <text x="256" y="380" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="white" text-anchor="middle" opacity="0.85">Konverter billeder med et klik</text>
  <!-- Format badges -->
  <g font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" text-anchor="middle">
    <rect x="60" y="410" width="56" height="28" rx="6" fill="white" opacity="0.25" />
    <text x="88" y="430" fill="white">PNG</text>
    <rect x="128" y="410" width="56" height="28" rx="6" fill="white" opacity="0.25" />
    <text x="156" y="430" fill="white">BMP</text>
    <rect x="196" y="410" width="56" height="28" rx="6" fill="white" opacity="0.25" />
    <text x="224" y="430" fill="white">GIF</text>
    <rect x="264" y="410" width="56" height="28" rx="6" fill="white" opacity="0.25" />
    <text x="292" y="430" fill="white">TIFF</text>
    <rect x="332" y="410" width="64" height="28" rx="6" fill="white" opacity="0.25" />
    <text x="364" y="430" fill="white">WEBP</text>
    <rect x="408" y="410" width="56" height="28" rx="6" fill="white" opacity="0.25" />
    <text x="436" y="430" fill="white">HEIC</text>
  </g>
</svg>
